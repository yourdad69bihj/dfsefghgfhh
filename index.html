<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#00ff88">
    
    <title>JS VPN PRO</title>
    <style>
        :root { --bg: #080808; --panel: #121212; --accent: #00ff88; --premium: #f39c12; --text: #fff; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); margin: 0; overflow: hidden; height: 100vh; }
        
        .screen { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; transition: 0.5s; background: var(--bg); z-index: 10; }
        .hidden { display: none !important; }

        /* --- Auth Style --- */
        .auth-input { width: 100%; padding: 15px; background: #111; border: 1px solid #333; color: white; border-radius: 10px; margin-bottom: 10px; outline: none; }
        .auth-input:focus { border-color: var(--accent); }
        .btn { width: 100%; padding: 15px; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .primary-btn { background: var(--accent); color: #000; }
        
        /* --- Loading Animation --- */
        #loading-screen { z-index: 100; background: #000; }
        .loader {
            width: 80px; height: 80px;
            border: 5px solid #111; border-top: 5px solid var(--accent);
            border-radius: 50%; animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* --- VPN UI --- */
        .status-ring {
            width: 180px; height: 180px; border-radius: 50%;
            border: 4px solid #222; display: flex; align-items: center;
            justify-content: center; cursor: pointer; transition: 0.3s;
        }
        .connected { border-color: var(--accent); box-shadow: 0 0 40px rgba(0,255,136,0.3); }
        .power-icon { font-size: 50px; color: #222; transition: 0.3s; }
        .connected .power-icon { color: var(--accent); transform: scale(1.1); }

        .location-box { background: var(--panel); border: 1px solid #333; width: 100%; padding: 15px; border-radius: 15px; margin-top: 30px; }
        select { width: 100%; background: #000; color: var(--accent); border: 1px solid #333; padding: 12px; border-radius: 8px; margin-top: 10px; font-weight: bold; outline: none; }
        
        .premium-badge { background: var(--premium); color: black; font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: bold; margin-bottom: 5px; display: inline-block; }
    </style>
</head>
<body>

<div id="app-container">
    
    <div id="auth-screen" class="screen">
        <h2 style="color: var(--accent); letter-spacing: 2px;">JS VPN HUB</h2>
        <p style="color: #666; font-size: 14px; margin-bottom: 25px;">Login to unlock Premium Spoofing</p>
        <input type="text" id="user" class="auth-input" placeholder="Username">
        <input type="password" id="pass" class="auth-input" placeholder="Password">
        <button class="btn primary-btn" onclick="startLoading()">CREATE ACCOUNT</button>
        <p style="font-size: 12px; color: #444; margin-top: 15px;">By joining, you unlock 10+ locations</p>
    </div>

    <div id="loading-screen" class="screen hidden">
        <div class="loader"></div>
        <p id="loading-text" style="color: var(--accent); letter-spacing: 2px; font-size: 12px;">INITIALIZING PROTOCOLS...</p>
    </div>

    <div id="vpn-screen" class="screen hidden">
        <div id="premium-tag" class="hidden"><span class="premium-badge">PREMIUM UNLOCKED</span></div>
        <h1 id="hub-name" style="color: var(--accent); letter-spacing: 4px; margin: 5px 0;">JS VPN</h1>
        <p id="conn-status" style="color: #444; font-size: 12px; margin-bottom: 30px;">ENCRYPTION IDLE</p>

        <div id="toggle-btn" class="status-ring" onclick="toggleVPN()">
            <div class="power-icon">⏻</div>
        </div>

        <div class="location-box">
            <span style="font-size: 11px; color: #888; text-transform: uppercase;">Secure Tunnel End-Point</span>
            <select id="loc-picker" onchange="if(isConnected) updateIP()">
                <option value="us">United States (Los Angeles)</option>
                <option value="uk">United Kingdom (London)</option>
                <option value="ru" class="prem-opt hidden">Russia (Moscow)</option>
                <option value="br" class="prem-opt hidden">Brazil (Sao Paulo)</option>
                <option value="au" class="prem-opt hidden">Australia (Sydney)</option>
                <option value="jp" class="prem-opt hidden">Japan (Tokyo)</option>
            </select>
        </div>
        
        <div style="margin-top: 25px; text-align: center;">
            <p style="font-size: 11px; color: #666; margin: 0;">VIRTUAL IP ADDRESS</p>
            <p id="user-ip" style="font-size: 18px; font-weight: bold; color: #333; margin: 5px 0;">192.168.1.1</p>
        </div>
        
        <button class="btn" style="background: none; color: #ff4444; font-size: 10px;" onclick="location.reload()">LOGOUT</button>
    </div>
</div>

<script>
    let isConnected = false;
    let isPremium = false;
    let rotationInterval;

    const ipData = {
        us: "104.28.",
        uk: "45.148.",
        ru: "95.161.",
        br: "177.54.",
        au: "103.25.",
        jp: "163.43."
    };

    function startLoading() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        
        if (u && p) {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('loading-screen').classList.remove('hidden');
            
            // Simulation texts
            const steps = ["BYPASSING FIREWALL...", "INJECTING PACKETS...", "ENCRYPTING TUNNEL...", "PRO HUB READY"];
            let i = 0;
            const textEl = document.getElementById('loading-text');
            
            const loadInterval = setInterval(() => {
                textEl.innerText = steps[i];
                i++;
                if (i >= steps.length) {
                    clearInterval(loadInterval);
                    login(u);
                }
            }, 800);
        } else {
            alert("Invalid Credentials");
        }
    }

    function login(username) {
        isPremium = true;
        document.getElementById('loading-screen').classList.add('hidden');
        document.getElementById('vpn-screen').classList.remove('hidden');
        document.getElementById('premium-tag').classList.remove('hidden');
        document.getElementById('hub-name').innerText = username.toUpperCase() + " VPN";
        
        document.querySelectorAll('.prem-opt').forEach(opt => opt.classList.remove('hidden'));
    }

    function updateIP() {
        if (!isConnected) return;
        const loc = document.getElementById('loc-picker').value;
        const range = ipData[loc] || "10.0.";
        const newIP = range + Math.floor(Math.random() * 255) + "." + Math.floor(Math.random() * 255);
        document.getElementById('user-ip').innerText = newIP;
        document.getElementById('user-ip').style.color = "var(--accent)";
    }

    function toggleVPN() {
        isConnected = !isConnected;
        const btn = document.getElementById('toggle-btn');
        const status = document.getElementById('conn-status');

        if (isConnected) {
            btn.classList.add('connected');
            status.innerText = "TUNNEL PROTECTED";
            status.style.color = "var(--accent)";
            updateIP();
            if(isPremium) rotationInterval = setInterval(updateIP, 4000);
        } else {
            clearInterval(rotationInterval);
            btn.classList.remove('connected');
            status.innerText = "ENCRYPTION IDLE";
            status.style.color = "#444";
            document.getElementById('user-ip').innerText = "192.168.1.1";
            document.getElementById('user-ip').style.color = "#333";
        }
    }
</script>
</body>
</html>
