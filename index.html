<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>JS VPN PRO</title>
    <style>
        :root { 
            --bg: #050505; 
            --panel: rgba(20, 20, 20, 0.95); 
            --accent: #00ff88; 
            --premium: #f39c12; 
            --text: #ffffff;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); margin: 0; overflow: hidden; height: 100vh; }
        
        /* --- High End UI Layout --- */
        .screen { 
            position: absolute; width: 100%; height: 100%; 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; padding: 30px; transition: 0.5s; 
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            z-index: 10; 
        }
        .hidden { display: none !important; }

        .glass-panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 25px;
            padding: 30px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            text-align: center;
        }

        /* --- Auth Styling --- */
        .auth-input { 
            width: 100%; padding: 15px; background: rgba(0,0,0,0.5); 
            border: 1px solid #333; color: white; border-radius: 12px; 
            margin-bottom: 12px; outline: none; font-size: 14px;
        }
        .auth-input:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(0,255,136,0.2); }
        
        .btn { 
            width: 100%; padding: 16px; border-radius: 50px; border: none; 
            font-weight: bold; cursor: pointer; transition: 0.2s;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .primary-btn { background: var(--accent); color: #000; box-shadow: 0 5px 15px rgba(0,255,136,0.3); }
        .secondary-btn { background: transparent; color: var(--accent); border: 1px solid var(--accent); margin-top: 10px; }
        .btn:active { transform: scale(0.96); }

        /* --- VPN Status Ring --- */
        .status-ring {
            width: 190px; height: 190px; border-radius: 50%;
            border: 2px solid #222; display: flex; align-items: center;
            justify-content: center; cursor: pointer; transition: 0.4s;
            margin: 20px auto;
        }
        .connected { border-color: var(--accent); box-shadow: 0 0 50px rgba(0,255,136,0.2), inset 0 0 20px rgba(0,255,136,0.1); }
        .power-icon { font-size: 60px; color: #222; transition: 0.4s; }
        .connected .power-icon { color: var(--accent); text-shadow: 0 0 20px var(--accent); }

        .location-select {
            width: 100%; background: #000; color: var(--accent);
            border: 1px solid #333; padding: 14px; border-radius: 12px;
            font-weight: bold; appearance: none; text-align: center;
        }

        .premium-tag { 
            color: var(--premium); font-size: 11px; font-weight: bold; 
            letter-spacing: 2px; margin-bottom: 5px; 
        }
    </style>
</head>
<body>

<div id="app-container">
    
    <div id="auth-screen" class="screen">
        <div class="glass-panel">
            <h2 style="color: var(--accent); margin-top: 0;">JS VPN HUB</h2>
            <p style="color: #888; font-size: 13px; margin-bottom: 25px;">Unique Identity Protection Active</p>
            
            <input type="text" id="user-in" class="auth-input" placeholder="Desired Username">
            <input type="password" id="pass-in" class="auth-input" placeholder="Secure Password">
            
            <button class="btn primary-btn" onclick="validateUser()">Create Unique Account</button>
            <button class="btn secondary-btn" onclick="skipAuth()">Use Basic Mode</button>
            
            <p id="error-msg" style="color: #ff4444; font-size: 11px; margin-top: 15px; font-weight: bold;"></p>
        </div>
    </div>

    <div id="vpn-screen" class="screen hidden">
        <div class="glass-panel">
            <div id="prem-indicator" class="premium-tag hidden">PRO ACCESS UNLOCKED</div>
            <h1 id="hub-name" style="margin: 0; font-size: 20px; color: var(--accent);">GUEST VPN</h1>
            <p id="conn-status" style="color: #555; font-size: 11px; margin-bottom: 15px;">WAITING FOR HANDSHAKE</p>

            <div id="toggle-btn" class="status-ring" onclick="toggleVPN()">
                <div class="power-icon">⏻</div>
            </div>

            <div style="text-align: left; margin-top: 20px;">
                <span style="font-size: 10px; color: #666; margin-left: 5px;">LOCATION SPOOFER</span>
                <select id="loc-picker" class="location-select" onchange="if(isConnected) updateIP()">
                    <option value="us">United States (Basic)</option>
                    <option value="uk">United Kingdom (Basic)</option>
                    <option value="ru" class="prem-opt hidden">Russia (Premium)</option>
                    <option value="jp" class="prem-opt hidden">Japan (Premium)</option>
                </option>
                </select>
            </div>
            
            <div style="margin-top: 20px;">
                <p id="user-ip" style="font-size: 22px; font-weight: bold; color: #222; margin: 0;">192.168.1.1</p>
                <p style="font-size: 9px; color: #444; margin: 0;">PROTECTED IP ADDRESS</p>
            </div>

            <button style="background:none; border:none; color:#ff4444; font-size:10px; margin-top:20px; cursor:pointer;" onclick="location.reload()">LOGOUT</button>
        </div>
    </div>
</div>

<script>
    // --- DATABASE SIMULATION ---
    const takenUsernames = ["jordan", "admin", "owner", "mod"];
    let isConnected = false;
    let isPremium = false;
    let rotationInterval;

    const ipData = { us: "104.28.", uk: "45.148.", ru: "95.161.", jp: "163.43." };

    function validateUser() {
        const u = document.getElementById('user-in').value.toLowerCase();
        const p = document.getElementById('pass-in').value;
        const err = document.getElementById('error-msg');

        if (!u || !p) {
            err.innerText = "FILL ALL FIELDS";
            return;
        }

        if (takenUsernames.includes(u)) {
            err.innerText = "USERNAME ALREADY TAKEN";
            return;
        }

        // Successfully created unique account
        isPremium = true;
        enterHub(u);
    }

    function skipAuth() {
        isPremium = false;
        enterHub("Guest");
    }

    function enterHub(name) {
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('vpn-screen').classList.remove('hidden');
        document.getElementById('hub-name').innerText = name.toUpperCase() + " VPN";
        
        if (isPremium) {
            document.getElementById('prem-indicator').classList.remove('hidden');
            document.querySelectorAll('.prem-opt').forEach(opt => opt.classList.remove('hidden'));
        }
    }

    function updateIP() {
        if (!isConnected) return;
        const loc = document.getElementById('loc-picker').value;
        const range = ipData[loc] || "10.0.";
        const newIP = range + Math.floor(Math.random() * 255) + "." + Math.floor(Math.random() * 255);
        document.getElementById('user-ip').innerText = newIP;
        document.getElementById('user-ip').style.color = "var(--accent)";
    }

    function toggleVPN() {
        isConnected = !isConnected;
        const btn = document.getElementById('toggle-btn');
        const status = document.getElementById('conn-status');

        if (isConnected) {
            btn.classList.add('connected');
            status.innerText = "ENCRYPTED TUNNEL ACTIVE";
            status.style.color = "var(--accent)";
            updateIP();
            if(isPremium) rotationInterval = setInterval(updateIP, 3000);
        } else {
            clearInterval(rotationInterval);
            btn.classList.remove('connected');
            status.innerText = "WAITING FOR HANDSHAKE";
            status.style.color = "#555";
            document.getElementById('user-ip').innerText = "192.168.1.1";
            document.getElementById('user-ip').style.color = "#222";
        }
    }
</script>
</body>
</html>
