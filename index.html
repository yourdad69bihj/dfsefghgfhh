<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>JS VPN</title>
    <style>
        :root { --bg: #080808; --panel: #121212; --accent: #00ff88; --text: #fff; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); margin: 0; overflow: hidden; height: 100vh; }
        
        .screen { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; transition: 0.5s; }
        .hidden { display: none !important; }

        /* --- VPN UI --- */
        .status-ring {
            width: 200px; height: 200px; border-radius: 50%;
            border: 4px solid #333; display: flex; align-items: center;
            justify-content: center; cursor: pointer; position: relative;
            transition: 0.3s;
        }
        .connected { border-color: var(--accent); box-shadow: 0 0 30px var(--accent); }
        .power-icon { font-size: 50px; color: #333; }
        .connected .power-icon { color: var(--accent); }

        .location-box {
            background: var(--panel); border: 1px solid #333;
            width: 100%; padding: 15px; border-radius: 12px;
            margin-top: 40px; text-align: left;
        }
        
        select {
            width: 100%; background: #000; color: var(--accent);
            border: 1px solid var(--accent); padding: 10px; border-radius: 8px; margin-top: 10px;
        }

        /* --- FINGERPRINT --- */
        .finger-print { width: 80px; fill: var(--accent); cursor: pointer; }
        .scan-line { width: 100%; height: 2px; background: var(--accent); position: absolute; top: 0; animation: scan 2s infinite; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
    </style>
</head>
<body>

<div id="app-container">
    <div id="unlock-screen" class="screen">
        <h2 style="color: var(--accent);">JS VPN SECURITY</h2>
        <p style="color: #888;">Hold to Authenticate</p>
        <div style="position: relative; overflow: hidden; padding: 10px;">
            <svg class="finger-print" viewBox="0 0 24 24" onmousedown="startScan()" onmouseup="stopScan()" ontouchstart="startScan()" ontouchend="stopScan()">
                <path d="M12,1C5.93,1,1,5.93,1,12s4.93,11,11,11,11-4.93,11-11S18.07,1,12,1Zm0,20c-4.41,0-8-3.59-8-8s3.59-8,8-8,8,3.59,8,8-3.59,8-8,8Zm-1-13h2v6h-2v-6Zm0,8h2v2h-2v-2Z"/>
            </svg>
            <div id="scanner" class="scan-line hidden"></div>
        </div>
    </div>

    <div id="vpn-screen" class="screen hidden">
        <h1 style="color: var(--accent); letter-spacing: 4px;">JS VPN</h1>
        <p id="conn-status" style="color: #666; margin-bottom: 30px;">DISCONNECTED</p>

        <div id="toggle-btn" class="status-ring" onclick="toggleVPN()">
            <div class="power-icon">⏻</div>
        </div>

        <div class="location-box">
            <span style="font-size: 12px; color: #888;">SPOOF LOCATION</span>
            <select id="loc-picker">
                <option value="us">United States (Los Angeles)</option>
                <option value="uk">United Kingdom (London)</option>
                <option value="jp">Japan (Tokyo)</option>
                <option value="de">Germany (Frankfurt)</option>
            </select>
        </div>
        
        <p style="font-size: 10px; color: #444; margin-top: 20px;">IP: <span id="user-ip">192.168.1.1</span></p>
    </div>
</div>

<script>
    let isConnected = false;
    let scanTimeout;

    function startScan() {
        document.getElementById('scanner').classList.remove('hidden');
        scanTimeout = setTimeout(() => {
            document.getElementById('unlock-screen').classList.add('hidden');
            document.getElementById('vpn-screen').classList.remove('hidden');
        }, 1500);
    }

    function stopScan() {
        clearTimeout(scanTimeout);
        document.getElementById('scanner').classList.add('hidden');
    }

    function toggleVPN() {
        isConnected = !isConnected;
        const btn = document.getElementById('toggle-btn');
        const status = document.getElementById('conn-status');
        const ipDisplay = document.getElementById('user-ip');

        if (isConnected) {
            btn.classList.add('connected');
            status.innerText = "CONNECTED - SECURE";
            status.style.color = "#00ff88";
            ipDisplay.innerText = "104.28." + Math.floor(Math.random() * 255) + "." + Math.floor(Math.random() * 255);
            alert("Location Spoofed to: " + document.getElementById('loc-picker').selectedOptions[0].text);
        } else {
            btn.classList.remove('connected');
            status.innerText = "DISCONNECTED";
            status.style.color = "#666";
            ipDisplay.innerText = "192.168.1.1";
        }
    }

    // Handle "Lost Password" Simulation via console
    function forgotPass() {
        alert("Verification link sent to your registered email.");
    }
</script>
</body>
</html>
